backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string", default: "Rachel Albertson" }
      - { label: "Category", name: "category", widget: "select", options: ["Networking Tips", "Introverts Welcome", "Connections & Collaboration"] }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Featured Image", name: "thumbnail", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Tags", name: "tags", widget: "list" }
      - { label: "Focus Keyword", name: "focusKeyword", widget: "string", required: false }
      - { label: "Meta Title", name: "metaTitle", widget: "string", required: false }
      - { label: "Meta Description", name: "metaDescription", widget: "text", required: false }
      - { label: "Series", name: "series", widget: "string", required: false }
      - { label: "Series Order", name: "seriesOrder", widget: "number", required: false }
      - { label: "Read Time", name: "readTime", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }

  - name: "manchester"
    label: "Manchester (NAPSTER)"
    folder: "src/content/cities/manchester"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Day", name: "day", widget: "string", default: "Tuesday" }
      - { label: "Time", name: "time", widget: "string", default: "9:00am" }
      - { label: "Location", name: "location", widget: "string", default: "FirstBank" }
      - { label: "Address", name: "address", widget: "string", default: "1500 Hillsboro Blvd, Manchester, TN 37355" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "murfreesboro"
    label: "Murfreesboro (BORO NAP)"
    folder: "src/content/cities/murfreesboro"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Day", name: "day", widget: "string", default: "Wednesday" }
      - { label: "Time", name: "time", widget: "string", default: "9:00am" }
      - { label: "Location", name: "location", widget: "string", default: "Achieve Entrepreneur & CoWorking Center" }
      - { label: "Address", name: "address", widget: "string", default: "1630 S Church St #100, Murfreesboro, TN 37130" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "nolensville"
    label: "Nolensville (N²)"
    folder: "src/content/cities/nolensville"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Day", name: "day", widget: "string", default: "Thursday" }
      - { label: "Time", name: "time", widget: "string", default: "9:00am" }
      - { label: "Location", name: "location", widget: "string", default: "Waldo's Chicken and Beer" }
      - { label: "Address", name: "address", widget: "string", default: "7238 Nolensville Road, Nolensville, TN 37135" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "smyrna"
    label: "Smyrna (SNAP)"
    folder: "src/content/cities/smyrna"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Day", name: "day", widget: "string", default: "Friday" }
      - { label: "Time", name: "time", widget: "string", default: "9:15am" }
      - { label: "Location", name: "location", widget: "string", default: "Smyrna Public Library" }
      - { label: "Address", name: "address", widget: "string", default: "400 Enon Springs Rd W, Smyrna, TN 37167" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
